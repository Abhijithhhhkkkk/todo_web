<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todoweb</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --primary-orange: #d97b29; /* more vibrant orange */
            --light-orange: #f2dec5; /* soft beige */
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Top Bar */
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 10vh;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .para {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .para h2 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        #welcome {
            color: var(--primary-orange);
            background-color: var(--light-orange);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #welcome:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 123, 41, 0.2);
        }
        #logoutBtn {
            font-weight: 500;
            color: var(--primary-orange);
            background-color: transparent;
            border: 1.5px solid var(--primary-orange);
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #logoutBtn:hover {
            background-color: var(--primary-orange);
            color: white;
            box-shadow: 0 4px 12px rgba(217, 123, 41, 0.2);
        }
        #logoutBtn:active {
            transform: scale(0.95);
        }
        /* Main Content area */
        .side {
            display: flex;
            flex: 1;
            padding: 3vh 5%;
            gap: 2rem;
            height: 90vh; /* Remaining height */
        }
        /* Left side - Add Task */
        .left {
            background-color: white;
            width: 320px; /* Fixed width for standard look */
            border-radius: 24px;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            height: fit-content;
        }
        #random {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }
        #what {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.4;
        }
        #taskinput {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafafa;
        }
        #taskinput:focus {
            background-color: white;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 4px rgba(217, 123, 41, 0.15);
        }
        #addBtn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-orange);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 12px rgba(217, 123, 41, 0.2);
        }
        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(217, 123, 41, 0.3);
            background-color: #c96e20;
        }
        #addBtn:active {
            transform: scale(0.97);
        }
        /* Right side - Task List */
        .right {
            flex: 1;
            background-color: white;
            border-radius: 24px;
            padding: 2.5rem 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            overflow-y: auto;
        }
        #two {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 1rem;
        }
        #tasklist {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* List Items - with transitions */
        #tasklist li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            
            /* Add animations to lists */
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #tasklist li:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            background-color: white;
            border: 1px solid rgba(0,0,0,0.03);
        }
        #tasklist li.removing {
            opacity: 0;
            transform: scale(0.9) translateY(-10px);
            margin-top: -60px; /* Collapse space smoothly */
            margin-bottom: 12px;
            pointer-events: none;
        }
        .delete-btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0; /* Hidden by default */
            transform: translateX(10px);
        }
        #tasklist li:hover .delete-btn {
            opacity: 1;
            transform: translateX(0);
        }
        .delete-btn:hover {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transform: translateX(0) scale(1.05);
        }
        .delete-btn:active {
            transform: translateX(0) scale(0.92) !important;
        }
        /* Keyframes for list entry */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        /* Responsive */
        @media (max-width: 768px) {
            .side {
                flex-direction: column;
                height: auto;
            }
            .left {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="top">
        <div class="para">
            <h2>My Tasks</h2>
            <button id="welcome">Welcome!</button>
        </div>
        <button id="logoutBtn" onclick="window.location.href='index.html'">Logout</button>
    </div>
    <div class="side">
        <div class="left">
            <span>
               <h1 id="random">Add a Task</h1>
                <p id="what">What do you need to get done today?</p>
            </span>
            <input type="text" placeholder="Enter task" id="taskinput" onkeypress="handleKeyPress(event)">
            <button id="addBtn" onclick="addTask()">Add Task</button>
        </div>
        <div class="right">
            <h2 id="two">Tasks</h2>
            <ul id="tasklist"></ul>
        </div>
    </div>
    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        }
        function addTask() {
            let taskinput = document.getElementById('taskinput');
            let taskText = taskinput.value.trim();
            
            if (taskText === "") {
                // Shake animation for input on empty submit
                taskinput.style.animation = 'none';
                taskinput.offsetHeight; /* trigger reflow */
                taskinput.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
                setTimeout(() => {
                    alert('Please enter a task');
                }, 100);
                return;
            }
            
            let tasklist = document.getElementById('tasklist');
            let taskItem = document.createElement('li');
            
            let textSpan = document.createElement('span');
            textSpan.textContent = taskText;
            taskItem.appendChild(textSpan);
            
            let DeleteBtn = document.createElement('button');
            DeleteBtn.textContent = 'Delete';
            DeleteBtn.className = 'delete-btn';
            
            // Smooth delete animation
            DeleteBtn.onclick = function () {
                taskItem.classList.add('removing');
                // Wait for the transition to finish before removing from DOM
                setTimeout(() => {
                    taskItem.remove();
                }, 400); // 400ms matches the CSS transition time
            };
            
            taskItem.appendChild(DeleteBtn);
            tasklist.appendChild(taskItem);
            
            taskinput.value = "";
            taskinput.focus();
        }
        // Add shake animation dynamic style
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
