<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todoweb</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, sans-serif;
            background-color: hsl(0, 0%, 96%);
        }
        .top{
            display:flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 5%;
            padding-left: 5%;
            height:10vh;
        }
        .para{
            display:flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        #welcome{
            color:grey;
            background-color:#F3DFC0;
            padding:3%;
            border-radius: 30%;
            width:100px;
            border:1px solid #F3DFC0;

        }
        #logoutBtn{
            font-style: italic;
            font-weight: bolder;
            font-family: Arial, Helvetica, sans-serif;
            color:#c47c3e;
            background-color: transparent;
            border:2px solid #c47c3e;
            padding:10px 20px;
            border-radius: 20%;
        }
        .side{
            display:flex;
            justify-content: space-between;
            
            
         

        }
        .left{
            background-color: #F3DFC0;
            height: 90vh;
            width: 20%;
            display:flex;
            flex-direction: column;
           padding-left: 3%;
           padding-top: 4%;
           padding-right: 3%;
           gap:5%;
           border:1px solid #c47c3e;
        }
    #what{
        color:grey;
        font-size: 15px;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    #taskinput{
        text-align: center;
        padding:10px;
        border-radius: 20px;
        border:1px solid #c47c3e;
        width:100%;
        height: 6vh;
    }
    #addBtn{
        text-align: center;
        padding:10px;
        border-radius: 20px;
        border:1px solid #F3DFC0;
        width:100%;
        height: 6vh;
        background-color: #c47c3e;
        color: beige;
    }
    .right{
        flex:1;
        padding:2rem 2.5rem;
        background-color: rgb(244, 224, 194);
        border: 1px solid #f47c3e;
    }
    #two{
        text-align: center;
        font-size: 32px;
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        text-shadow: none;
    }
    .delete-btn{
        margin-left: 20px;
        padding: 5px 10px;
        border: none;
        background-color: #c47c3e;
        color: beige;
        border-radius: 5px;
        cursor: pointer;
    }
    ul{
        font-size: 18px;
    }
    </style>
           
        
    
</head>
<body>
    <div class="top">
        <div class="para">
        <h2>My Tasks</h2>
        <button id="welcome">Welcome! </button>
        </div>
        <button id="logoutBtn" onclick="window.location.href='index.html'">Logout</button>
    </div>
    <div class="side">
        <div class="left">
            <span>
               <h1 id="random">Add a Task</h1>
                <p id="what">What do you need to get done today?</p>
            </span>

            <input type="text" placeholder="Enter task" id="taskinput">
            <button id="addBtn" onclick="addTask()">Add</button>

        </div>
        <div class="right">
            <h2 id="two">Tasks</h2>
            <ul id="tasklist"></ul>
            

        </div>
    </div>
    <script>
        function addTask(){
            let taskinput=document.getElementById('taskinput').value;
            if(taskinput ===""){
                alert('please enter a task');
                return;
            }
            let tasklist=document.getElementById('tasklist');
            let taskItem=document.createElement('li');
            taskItem.textContent=taskinput;
            let DeleteBtn = document.createElement('button');
            DeleteBtn.textContent = 'Delete';
            DeleteBtn.className = 'delete-btn';
            DeleteBtn.onclick = function () {
                taskItem.remove();
            };
            taskItem.appendChild(DeleteBtn);
            tasklist.appendChild(taskItem);
            document.getElementById('taskinput').value="";
        }
     

    </script>
</body>
</html>
