<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --navy: #0a0f2e;
    --navy-mid: #111a45;
    --accent: #c8a96e;
    --accent-light: #e8cfa0;
    --text-light: #f0eee8;
    --text-muted: #8a8fa8;
    --card-bg: #ffffff;
    --input-border: #d8d4cc;
    --error: #c0392b;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
  }

  body {
    display: flex;
    min-height: 100vh;
    background: var(--navy);
    overflow: hidden;
  }

  /* ── Left panel ── */
  .panel-left {
    position: relative;
    width: 55%;
    background: linear-gradient(145deg, var(--navy) 0%, var(--navy-mid) 60%, #1a2560 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 64px;
    overflow: hidden;
  }

  /* Decorative circles */
  .panel-left::before,
  .panel-left::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(200, 169, 110, 0.18);
  }
  .panel-left::before {
    width: 520px; height: 520px;
    bottom: -180px; right: -160px;
  }
  .panel-left::after {
    width: 280px; height: 280px;
    top: -80px; left: -80px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(200, 169, 110, 0.10);
    width: 360px; height: 360px;
    bottom: -60px; right: -60px;
    pointer-events: none;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 3.5vw, 3.2rem);
    color: var(--text-light);
    line-height: 1.2;
    max-width: 480px;
    animation: fadeUp 0.8s ease both;
  }

  .tagline span {
    color: var(--accent);
  }

  .sub {
    margin-top: 20px;
    font-size: 0.95rem;
    color: var(--text-muted);
    max-width: 380px;
    line-height: 1.7;
    font-weight: 300;
    animation: fadeUp 0.9s 0.15s ease both;
  }

  .divider-accent {
    margin-top: 36px;
    width: 48px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: fadeUp 1s 0.25s ease both;
  }

  /* ── Right panel ── */
  .panel-right {
    width: 45%;
    background: #f7f5f0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    animation: slideIn 0.7s ease both;
  }

  .card {
    width: 100%;
    max-width: 400px;
  }

  .card-header {
    margin-bottom: 40px;
  }

  .card-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--navy);
    font-weight: 700;
  }

  .card-header p {
    margin-top: 6px;
    font-size: 0.875rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--navy);
    background: var(--card-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
  }

  input::placeholder {
    color: #bbb;
    font-weight: 300;
  }

  .error-msg {
    display: none;
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--error);
  }

  .error-msg.visible {
    display: block;
  }

  .input-wrap {
    position: relative;
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    display: flex;
    align-items: center;
  }

  .toggle-pw:hover { color: var(--navy); }

  .forgot {
    display: block;
    text-align: right;
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-login {
    margin-top: 32px;
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--accent-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.25s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    background: #1a2560;
    transform: translateY(-1px);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .btn-login.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
    animation: shimmer 1s infinite;
  }

  .footer-note {
    margin-top: 28px;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: center;
  }

  .footer-note a {
    color: var(--navy);
    font-weight: 500;
    text-decoration: none;
  }

  .footer-note a:hover { text-decoration: underline; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    body { flex-direction: column; overflow: auto; }
    .panel-left {
      width: 100%;
      padding: 48px 32px 40px;
    }
    .panel-right {
      width: 100%;
      padding: 40px 24px 48px;
    }
  }
</style>
</head>
<body>

<!-- Left decorative panel -->
<div class="panel-left">
  <div class="ring"></div>
  <h1 class="tagline">Welcome<br>back to <span>Arkac.</span></h1>
  <p class="sub">Sign in to continue. Your workspace is ready and waiting.</p>
  <div class="divider-accent"></div>
</div>

<!-- Right login panel -->
<div class="panel-right">
  <div class="card">
    <div class="card-header">
      <h2>Sign in</h2>
      <p>Enter your credentials to access your account.</p>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. Arkac" autocomplete="username">
      <span class="error-msg" id="err-user">Username cannot be empty.</span>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Show password">
          <!-- eye icon -->
          <svg id="eye-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="error-msg" id="err-pass">Password cannot be empty.</span>
      <span class="error-msg" id="err-cred">Incorrect username or password.</span>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>

    <p class="footer-note">Don't have an account? <a href="#">Request access</a></p>
  </div>
</div>

<script>
  const CREDENTIALS = { username: 'Arkac', password: 'betterlucknexttime' };

  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));
    document.querySelectorAll('input').forEach(el => el.style.borderColor = '');
  }

  function showError(id, inputId) {
    document.getElementById(id).classList.add('visible');
    if (inputId) document.getElementById(inputId).style.borderColor = 'var(--error)';
  }

  function login() {
    clearErrors();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    if (!username) { showError('err-user', 'username'); valid = false; }
    if (!password) { showError('err-pass', 'password'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Verifying…';
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      if (username === CREDENTIALS.username && password === CREDENTIALS.password) {
        window.location.href = './home.html';
      } else {
        showError('err-cred', 'password');
        btn.textContent = 'Login';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }, 600);
  }

  function togglePw() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      pw.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
